code: dc-388
jurisdiction: "District of Columbia (DC Bar)"
opinion: "DC Bar Ethics Opinion 388"
date: "2024-04-30"
source_url: "https://www.dcbar.org/for-lawyers/legal-ethics/ethics-opinions-210-present/ethics-opinion-388"
verified: false
verified_by: ~
canonical_disclosure_text: |
  Generative artificial intelligence tools were used in the preparation of
  certain work product on this matter, under the supervision of the
  attorney of record. Consistent with the District of Columbia Rules of
  Professional Conduct (including Rules 1.1, 1.3, 1.5, 1.6, 5.1, and 5.3),
  the attorney verified the AI-assisted output, exercised independent
  professional judgment, and adopted the final work product as the
  attorney's own. The time billed reflects actual attorney time. No markup
  has been applied for AI-assisted efficiency.
notes: |
  DC Bar Ethics Opinion 388 (April 2024) addresses GAI use by DC-admitted
  lawyers under the DC Rules of Professional Conduct. It tracks the ABA
  Model opinion framework on competence, confidentiality, supervision,
  and fees.

  DC is a relatively narrow bar admission; many lawyers practicing in DC
  are admitted elsewhere and subject to that home jurisdiction's rules as
  well. If you are admitted in multiple jurisdictions, the strictest rule
  controls — confirm before relying on DC 388 alone.
billing_rules_summary: |
  Bill actual time. The opinion is consistent with the ABA framework: AI
  efficiency benefits the client, not the lawyer's hourly count. Fixed-fee
  matters should not be priced to capture AI efficiency in a way that
  misleads the client.
