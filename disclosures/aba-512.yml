code: aba-512
jurisdiction: "ABA Model (non-binding)"
opinion: "ABA Formal Opinion 512"
date: "2024-07-29"
source_url: "https://www.americanbar.org/content/dam/aba/administrative/professional_responsibility/ethics-opinions/aba-formal-opinion-512.pdf"
verified: false
verified_by: ~
canonical_disclosure_text: |
  Generative artificial intelligence tools were used in the preparation of
  certain matter-related work product under attorney supervision. The
  attorney of record reviewed the AI-assisted output, exercised independent
  professional judgment, and adopted the final work product as the
  attorney's own. The time billed reflects actual attorney time spent on
  this matter; no markup has been applied for AI-assisted efficiency.
notes: |
  ABA Formal Opinion 512 (July 2024), "Generative Artificial Intelligence
  Tools," addresses GAI use under ABA Model Rules 1.1 (competence), 1.3
  (diligence), 1.4 (communication), 1.5 (fees), 1.6 (confidentiality),
  3.3 (candor toward the tribunal), 5.1 / 5.3 (supervision), and 8.4
  (misconduct).

  The opinion identifies considerations rather than mandating a specific
  disclosure paragraph. The canonical text above is a conservative
  synthesis suitable for matters where the client has not been separately
  informed of GAI use in a signed engagement letter. If the client has
  expressly consented in the engagement letter, you may not need a per-bill
  disclosure — confirm against your engagement terms.

  This is an ABA Model opinion. Your state has not necessarily adopted it
  verbatim. Check whether your state bar has issued its own opinion
  (California, Florida, New York, DC, and others have).
billing_rules_summary: |
  Bill actual time. The opinion is clear that AI-assisted efficiency does
  not entitle the lawyer to bill more than the time actually spent. If
  billing on a fixed-fee basis, the fee does not change because AI made
  the work faster — but the lawyer must still ensure the bill does not
  misrepresent the work done. See Comment [4] to Rule 1.5.
